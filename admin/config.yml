backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "projects"
    label: "Projects"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Project Type", name: "type", widget: "select", options: ["Residential", "Commercial", "Infrastructure", "Retrofitting", "Water & Sanitation", "Other"] }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["Completed", "Ongoing", "Planned"] }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Cover Photo", name: "image", widget: "image", required: false }
      - { label: "Client Rating (1-5)", name: "rating", widget: "number", min: 1, max: 5, default: 5 }
      - { label: "NBC 2025 Compliant", name: "nbc", widget: "boolean", default: true }
      - { label: "ETABS Analysis Done", name: "etabs", widget: "boolean", default: false }
